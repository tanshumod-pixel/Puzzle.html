<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smile Detection System</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
color:white;
background:linear-gradient(-45deg,#ff9a9e,#fecfef,#fcb69f,#ffdde1);
background-size:400% 400%;
animation:bgmove 10s ease infinite;
}

@keyframes bgmove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
padding-top:30px;
}

/* camera */

.camera{
width:260px;
height:180px;
background:black;
margin:auto;
border-radius:15px;
position:relative;
overflow:hidden;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.scan{
position:absolute;
width:100%;
height:3px;
background:#00ffc3;
animation:scanmove 2s linear infinite;
}

@keyframes scanmove{
0%{top:0}
100%{top:100%}
}

.face{
font-size:70px;
margin-top:40px;
}

/* progress */

.progress{
width:300px;
height:14px;
background:rgba(255,255,255,0.3);
margin:20px auto;
border-radius:20px;
overflow:hidden;
}

.bar{
height:100%;
width:0%;
background:white;
}

/* puzzle */

#puzzle{
width:300px;
margin:30px auto;
display:none;
grid-template-columns:repeat(3,1fr);
gap:2px;
}

.piece{
width:100px;
height:100px;
background-size:300px 300px;
border-radius:6px;
cursor:pointer;
}

.selected{
outline:3px solid white;
}

/* button */

#continueBtn{
display:none;
margin-top:20px;
padding:12px 25px;
font-size:18px;
border:none;
border-radius:25px;
background:white;
color:#ff4f9c;
cursor:pointer;
}

/* final */

#final{
display:none;
font-size:24px;
margin-top:40px;
}

/* hearts */

.heart{
position:absolute;
font-size:26px;
animation:float 6s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0;}
50%{opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

</style>
</head>

<body>

<div class="container">

<h2 id="title">Smile Detection Camera</h2>

<div class="camera" id="camera">
<div class="scan"></div>
<div class="face">🙂</div>
</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="puzzle"></div>

<button id="continueBtn">Puzzle Completed ✔ Continue</button>

<div id="final"></div>

</div>

<script>

document.addEventListener("DOMContentLoaded", function(){

let bar=document.getElementById("bar")
let title=document.getElementById("title")
let puzzle=document.getElementById("puzzle")
let continueBtn=document.getElementById("continueBtn")
let final=document.getElementById("final")
let camera=document.getElementById("camera")

let progress=0
let selected=null

function startScan(){

let interval=setInterval(()=>{

progress++
bar.style.width=progress+"%"

if(progress==40) title.innerText="Scanning face..."
if(progress==70) title.innerText="Analyzing smile..."

if(progress>=100){

clearInterval(interval)

title.innerText="Smile Detected 🙂"

setTimeout(startPuzzle,1500)

}

},50)

}

function startPuzzle(){

camera.style.display="none"
document.querySelector(".progress").style.display="none"

title.innerText="Complete the Puzzle"

puzzle.style.display="grid"

createPuzzle()

}

function createPuzzle(){

let img="image/photo.jpg"

let pieces=[]

for(let i=0;i<9;i++){

let x=i%3
let y=Math.floor(i/3)

let div=document.createElement("div")

div.className="piece"

div.dataset.correct=i

div.style.backgroundImage=`url(${img})`
div.style.backgroundPosition=`-${x*100}px -${y*100}px`

pieces.push(div)

}

pieces.sort(()=>Math.random()-0.5)

pieces.forEach(p=>puzzle.appendChild(p))

document.querySelectorAll(".piece").forEach(piece=>{

piece.onclick=()=>{

if(!selected){

selected=piece
piece.classList.add("selected")

}else{

swapPieces(selected,piece)

selected.classList.remove("selected")
selected=null

checkCompletion()

}

}

})

}

function swapPieces(a,b){

let temp=a.style.backgroundPosition
a.style.backgroundPosition=b.style.backgroundPosition
b.style.backgroundPosition=temp

let t=a.dataset.correct
a.dataset.correct=b.dataset.correct
b.dataset.correct=t

}

function checkCompletion(){

let pieces=document.querySelectorAll(".piece")

let correct=true

pieces.forEach((piece,index)=>{

if(piece.dataset.correct!=index){
correct=false
}

})

if(correct){

continueBtn.style.display="inline-block"
title.innerText="Puzzle Completed 🎉"

}else{

continueBtn.style.display="none"

}

}

continueBtn.onclick=function(){

puzzle.style.display="none"
continueBtn.style.display="none"

showCelebration()

}

function showCelebration(){

final.style.display="block"

final.innerHTML="Keep smiling Khushi, the world looks better when you do.<br>Achievement Unlocked:Allow Sujoy your number please🙂" 

function showCelebration(){
  {
final.style.display="block"

final.innerHTML="🎉Hope it helps change your mind about this awesome guy.<br>Achievement Unlocked:Allow Sujoy your number please🙂"
  }
startFireworks()

setInterval(createHeart,400)

}
startFireworks()

setInterval(createHeart,400)

}

function startFireworks(){

setInterval(()=>{

confetti({
particleCount:200,
spread:120,
origin:{x:Math.random(),y:Math.random()*0.6}
})

},700)

}

function createHeart(){

let heart=document.createElement("div")

heart.className="heart"
heart.innerHTML="💗"

heart.style.left=Math.random()*100+"vw"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),6000)

}

startScan()

})

</script>

</body>
</html>
